## IDF Component Manager Manifest
dependencies:
  idf:
    version: '>=5.3.0'
  lvgl/lvgl: '>=8.4.0,<9.0.0'
  espressif/esp_lvgl_port:
    version: '>=2.3.0,<3.0.0'
  # esp_lcd_jd9165 forkeado a components/esp_lcd_jd9165/ con el read_id
  # del init parcheado (cuelga el host esperando respuesta del panel ->
  # WDT 5 s). No dependemos del componente managed para no traerlo de
  # vuelta a managed_components/. Ver components/esp_lcd_jd9165/.
  espressif/esp_lcd_touch_gt911:
    version: ^1
  espressif/esp_lcd_touch:
    version: ^1.1.2
  espressif/esp_wifi_remote:
    version: '>=0.2.0,<0.3.0'
  espressif/esp_hosted:
    version: '>=0.0.27,<0.1.0'
  espressif/onewire_bus: '>=0.1.0'
  espressif/ds18b20: '>=0.1.0'
  espressif/esp_codec_dev: ^1.3.0
  # Camara MIPI-CSI SC2336 (Hito 1: auto-brillo; luego movimiento->foto/video).
  # esp_video arrastra esp_cam_sensor (driver sc2336). Requiere idf >=5.4 (tenemos 5.4.4).
  espressif/esp_video: '>=2.2.0,<3.0.0'
